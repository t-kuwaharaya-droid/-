<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 世界の国境線マスタークイズ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            text-align: center;
            margin-top: 0;
        }
        hr {
            border: 0;
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }
        .progress-text {
            text-align: right;
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .question-type {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 5px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        h2 {
            font-size: 22px;
            color: #222;
            margin: 5px 0 15px 0;
        }
        .instruction {
            font-size: 13px;
            color: #666;
            background: #fff3cd;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .option-label {
            display: flex;
            align-items: center;
            margin: 12px 0;
            padding: 14px;
            background: #f8fafb;
            border: 2px solid #eef2f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: #eef5f9;
            border-color: #bce0fd;
        }
        .option-label input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        button {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #submit-btn { background-color: #007bff; color: white; }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        #prev-btn { background-color: #6c757d; color: white; }
        #next-btn { background-color: #28a745; color: white; }
        #restart-btn { background-color: #17a2b8; color: white; }
        
        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #result-area {
            background: #f8fafb;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            border-left: 6px solid #6c757d;
        }
        #result-text {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 10px 0;
        }
        #correct-answer-text {
            font-size: 16px;
            color: #333;
            margin: 0 0 10px 0;
        }
        .hint-box {
            font-size: 14px;
            color: #555;
            background: #e9ecef;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .map-container {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .score-title { font-size: 26px; font-weight: bold; text-align: center; color: #333; }
        .score-circle {
            width: 120px;
            height: 120px;
            background: #007bff;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin: 20px auto;
        }
        .score-comment { text-align: center; font-size: 16px; color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="progress-text" id="progress">問題 1 / --</div>
            <h1>🌍 世界の国境線クイズ</h1>
            <hr>
            <div class="question-type" id="q-type"></div>
            <h2 id="q-feature">読み込み中...</h2>
            <div class="instruction">💡 当てはまる国を<b>2つ</b>選択してください。</div>
            
            <div id="options-container"></div>
            
            <button id="submit-btn" onclick="checkAnswers()">回答を判定する</button>
            
            <div id="result-area" style="display: none;">
                <div id="result-text"></div>
                <div id="correct-answer-text"></div>
                <div class="hint-box" id="hint-text"></div>
                <div class="map-container">
                    <iframe id="map-frame" src=""></iframe>
                </div>
            </div>

            <div class="nav-buttons">
                <button id="prev-btn" onclick="prevQuestion()">⬅ 前の問題へ</button>
                <button id="next-btn" style="display: none;" onclick="nextQuestion()">次の問題へ 👉</button>
            </div>
        </div>

        <div id="result-screen" style="display: none;">
            <div class="score-title">🏆 クイズ結果</div>
            <hr>
            <div class="score-circle" id="final-score">0 / 0</div>
            <div class="score-comment" id="score-comment">お疲れ様でした！</div>
            <button id="restart-btn" onclick="restartQuiz()">もう一度挑戦する 🔄</button>
        </div>
    </div>

    <script>
        // 全17問のクイズデータ（全項目日本語・URL形式を完全チェック済み）
        const quizData = [
            { id: 3, type: "自然的国境", feature: "アンデス山脈", options: ["アルゼンチン", "ブラジル", "チリ", "ウルグアイ"], answers: ["アルゼンチン", "チリ"], map_query: "Andes+Mountains+border+Argentina+Chile", hint: "南米大陸の西側を南北に貫く世界最長の山脈です.尾根が2つの国の長い国境線となっています。" },
            { id: 4, type: "人為的国境", feature: "北緯49度・北緯45度・五大湖", options: ["アメリカ合衆国", "ロシア", "カナダ", "メキシコ"], answers: ["アメリカ合衆国", "カナダ"], map_query: "Great+Lakes", hint: "緯線を利用したまっすぐな国境線と、五大湖という水系を利用した自然的国境が組み合わさっています。" },
            { id: 5, type: "自然的国境", feature: "ウスリー川・アムール川", options: ["中国", "朝鮮民主主義人民共和国", "大韓民国", "ロシア"], answers: ["中国", "ロシア"], map_query: "Amur+River+border+China+Russia", hint: "東アジア北部を流れる大河です。過去にはこの川の中州の領有権をめぐって軍事衝突（ダマンスキー島事件など）も起きました。" },
            { id: 6, type: "人為的国境", feature: "東経141度", options: ["マレーシア", "インドネシア", "パプアニューギニア", "オーストラリア"], answers: ["インドネシア", "パプアニューギニア"], map_query: "141+East+meridian+border+New+Guinea", hint: "ニューギニア島を真っ二つに分ける経線（経度141度）を利用した人為的国境です。" },
            { id: 7, type: "自然的国境", feature: "メコン川", options: ["タイ", "カンボジア", "ラオス", "ミャンマー"], answers: ["タイ", "ラオス"], map_query: "Mekong+River+border+Thailand+Laos", hint: "東南アジアの国際河川です。特にこの2国の間では、川の真ん中が長い距離にわたって国境となっています。" },
            { id: 8, type: "自然的国境", feature: "テンシャン山脈", options: ["中国", "ロシア", "キルギス", "モンゴル"], answers: ["中国", "キルギス"], map_query: "Tian+Shan+border+China+Kyrgyzstan", hint: "中央アジアに位置する標高7000m級の険しい山脈です。" },
            { id: 9, type: "自然的国境", feature: "大インド砂漠", options: ["インド", "ブータン", "バングラデシュ", "パキスタン"], answers: ["インド", "パキスタン"], map_query: "Thar+Desert+border+India+Pakistan", hint: "タール砂漠とも呼ばれる乾燥地帯です。歴史的・宗教的な背景から非常に緊迫した国境線の一つです。" },
            { id: 10, type: "自然的国境", feature: "ルブアルハリ砂漠", options: ["サウジアラビア", "アラブ首長国連邦", "ヨルダン", "バーレーン"], answers: ["サウジアラビア", "アラブ首長国連邦"], map_query: "Rub+al+Khali+border+Saudi+Arabia+UAE", hint: "アラビア半島南部を占める世界最大級の砂砂漠です。かつては境界が曖昧でしたが、近代に画定されました。" },
            { id: 11, type: "人為的国境", feature: "東経25度", options: ["スーダン", "エジプト", "リビア", "エチオピア"], answers: ["エジプト", "リビア"], map_query: "Egypt+Libya+border", hint: "北アフリカの砂漠地帯を南北にまっすぐ縦断する、経線を利用した人為的国境です。" },
            { id: 12, type: "自然的国境", feature: "コンゴ川", options: ["コンゴ共和国", "中央アフリカ共和国", "コンゴ民主共和国", "ザンビア共和国"], answers: ["コンゴ共和国", "コンゴ民主共和国"], map_query: "Congo+River+border", hint: "アフリカ大陸で2番目に長い大河です。川を挟んで、国名が非常によく似た2つの国が向かい合っています。" },
            { id: 13, type: "自然的国境", feature: "タンガニーカ湖", options: ["タンザニア", "マラウイ", "ケニア", "コンゴ民主共和国"], answers: ["タンザニア", "コンゴ民主共和国"], map_query: "Lake+Tanganyika", hint: "アフリカ大地溝帯に位置する、南北に非常に細長い湖です。湖の真ん中を通る境界線です。" },
            { id: 14, type: "自然的国境", feature: "オレンジ川", options: ["ボツワナ", "ジンバブエ", "南アフリカ共和国", "ナミビア"], answers: ["南アフリカ共和国", "ナミビア"], map_query: "Orange+River+border+South+Africa+Namibia", hint: "アフリカ南部を西へ流れて大西洋に注ぐ川です。この2国の西側の国境線になっています。" },
            { id: 15, type: "自然的国境", feature: "スカンディナヴィア山脈", options: ["スウェーデン", "フィンランド", "ノルウェー", "デンマーク"], answers: ["スウェーデン", "ノルウェー"], map_query: "Scandinavian+Mountains+border", hint: "北欧の半島を背骨のように走る古い山脈です。この山脈を境に、西側と東側で国が分かれています。" },
            { id: 16, type: "自然的国境", feature: "アルプス山脈", options: ["スイス", "イタリア", "ベルギー", "スペイン"], answers: ["スイス", "イタリア"], map_query: "Alps+Mountains", hint: "ヨーロッパを代表する険しい山脈です。古くから交通の難所であり、文化や国の境界となってきました。" },
            { id: 17, type: "自然的国境", feature: "ライン川", options: ["スペイン", "フランス", "ドイツ", "イタリア"], answers: ["フランス", "ドイツ"], map_query: "Rhine+River+border+France+Germany", hint: "ヨーロッパの国際河川です。この2国の歴史の中で何度も領有権が争われたアルザス・ロレーヌ地方の脇を流れます。" },
            { id: 18, type: "自然的国境", feature: "ドナウ川", options: ["ルーマニア", "トルコ", "ブルガリア", "クロアチア"], answers: ["ルーマニア", "ブルガリア"], map_query: "Danube+River+border+Romania+Bulgaria", hint: "ヨーロッパを東へ流れる大河です。バルカン半島北部におけるこの2国の自然な境界となっています。" },
            { id: 19, type: "自然的国境", feature: "プルト川", options: ["ウクライナ", "ブルガリア", "モルドバ", "ルーマニア"], answers: ["モルドバ", "ルーマニア"], map_query: "Prut+River+border+Moldova+Romania", hint: "ドナウ川の支流で、東欧に位置します。この川を挟んで、言語や文化が非常に近い2つの国が接しています。" }
        ];

        let currentQuestionIndex = 0;
        let userHistory = {}; 

        function shuffleArray(array) {
            const clone = [...array];
            for (let i = clone.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [clone[i], clone[j]] = [clone[j], clone[i]];
            }
            return clone;
        }

        function loadQuestion() {
            const currentQuiz = quizData[currentQuestionIndex];
            
            document.getElementById('progress').innerText = `問題 ${currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById('q-type').innerText = `【${currentQuiz.type}】`;
            document.getElementById('q-feature').innerText = currentQuiz.feature;
            
            document.getElementById('prev-btn').disabled = (currentQuestionIndex === 0);

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 

            if (userHistory[currentQuestionIndex] && userHistory[currentQuestionIndex].userAnswers) {
                const history = userHistory[currentQuestionIndex];
                
                history.shuffledOptions.forEach(option => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    
                    const isChecked = history.userAnswers.includes(option);
                    label.innerHTML = `
                        <input type="checkbox" name="country" value="${option}" ${isChecked ? 'checked' : ''} disabled>
                        <span>${option}</span>
                    `;
                    optionsContainer.appendChild(label);
                });

                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'block';
                
                showResultVisual(history.isCorrect, currentQuiz);

            } else {
                let shuffledOptions;
                if (userHistory[currentQuestionIndex] && userHistory[currentQuestionIndex].shuffledOptions) {
                    shuffledOptions = userHistory[currentQuestionIndex].shuffledOptions;
                } else {
                    shuffledOptions = shuffleArray(currentQuiz.options);
                    userHistory[currentQuestionIndex] = { shuffledOptions: shuffledOptions };
                }

                shuffledOptions.forEach(option => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.innerHTML = `
                        <input type="checkbox" name="country" value="${option}" onchange="limitCheckbox()">
                        <span>${option}</span>
                    `;
                    optionsContainer.appendChild(label);
                });

                document.getElementById('submit-btn').style.display = 'block';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('result-area').style.display = 'none';
            }
        }

        function limitCheckbox() {
            const checkboxes = document.querySelectorAll('input[name="country"]');
            const checkedCount = document.querySelectorAll('input[name="country"]:checked').length;
            
            checkboxes.forEach(cb => {
                if (checkedCount >= 2 && !cb.checked) {
                    cb.disabled = true;
                } else {
                    cb.disabled = false;
                }
            });
        }

        function showResultVisual(isCorrect, currentQuiz) {
            const resultText = document.getElementById('result-text');
            if (isCorrect) {
                resultText.innerText = "⭕ 正解！";
                resultText.style.color = "#28a745";
            } else {
                resultText.innerText = "❌ 不正解...";
                resultText.style.color = "#dc3545";
            }
            
            document.getElementById('correct-answer-text').innerText = `正解は: ${currentQuiz.answers.join(' と ')}`;
            document.getElementById('hint-text').innerText = `💡 解説・ヒント:\n${currentQuiz.hint}`;
            
            // JavaScriptの変数展開（テンプレートリテラル）を標準仕様に完全統一
            const mapFrame = document.getElementById('map-frame');
            mapFrame.src = `https://maps.google.com/maps?q=${currentQuiz.map_query}&t=&z=5&ie=UTF8&iwloc=&output=embed`;
            
            document.getElementById('result-area').style.display = 'block';
        }

        function checkAnswers() {
            const currentQuiz = quizData[currentQuestionIndex];
            const checkedBoxes = document.querySelectorAll('input[name="country"]:checked');
            
            if (checkedBoxes.length !== 2) {
                alert("国を2つ選択してください！");
                return;
            }
            
            const userAnswers = Array.from(checkedBoxes).map(cb => cb.value);
            const isCorrect = userAnswers.every(answer => currentQuiz.answers.includes(answer)) && 
                              currentQuiz.answers.every(answer => userAnswers.includes(answer));
            
            document.querySelectorAll('input[name="country"]').forEach(cb => cb.disabled = true);

            userHistory[currentQuestionIndex].userAnswers = userAnswers;
            userHistory[currentQuestionIndex].isCorrect = isCorrect;

            showResultVisual(isCorrect, currentQuiz);
            
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                let totalScore = 0;
                Object.keys(userHistory).forEach(key => {
                    if (userHistory[key] && userHistory[key].isCorrect) totalScore++;
                });

                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                
                document.getElementById('final-score').innerText = `${totalScore} / ${quizData.length}`;
                
                const rate = totalScore / quizData.length;
                let comment = "";
                if (rate === 1) comment = "素晴らしい！完璧です！あなたは国境線マスター！";
                else if (rate >= 0.7) comment = "お見事！かなり地理の知識が身についています。";
                else if (rate >= 0.4) comment = "ナイスファイト！地図帳を見ながらもう一度挑戦してみよう。";
                else comment = "伸びしろがたくさん！繰り返し解いて覚えていこう！";
                
                document.getElementById('score-comment').innerText = comment;
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userHistory = {}; 
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
